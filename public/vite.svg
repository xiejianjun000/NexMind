<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="nexmind-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Brain/Mind icon -->
  <circle cx="50" cy="50" r="45" fill="url(#nexmind-gradient)"/>
  <!-- Neural network pattern -->
  <circle cx="35" cy="40" r="6" fill="white" opacity="0.9"/>
  <circle cx="65" cy="40" r="6" fill="white" opacity="0.9"/>
  <circle cx="50" cy="55" r="8" fill="white" opacity="0.9"/>
  <circle cx="35" cy="65" r="5" fill="white" opacity="0.7"/>
  <circle cx="65" cy="65" r="5" fill="white" opacity="0.7"/>
  <!-- Connection lines -->
  <line x1="35" y1="40" x2="50" y2="55" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="65" y1="40" x2="50" y2="55" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="55" x2="35" y2="65" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="55" x2="65" y2="65" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="35" y1="40" x2="65" y2="40" stroke="white" stroke-width="1.5" opacity="0.4"/>
</svg>
