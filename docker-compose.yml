# NexMind Docker Compose Configuration
# Production-ready with PostgreSQL, Redis, and Nginx

version: '3.8'

services:
  # NexMind Application
  nexmind:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexmind-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://nexmind:nexmind_secret@postgres:5432/nexmind
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=your_session_secret_here
      - API_KEY=your_api_key_here
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - nexmind-network
    volumes:
      - nexmind-data:/app/data
      - nexmind-logs:/app/logs

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nexmind-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=nexmind
      - POSTGRES_PASSWORD=nexmind_secret
      - POSTGRES_DB=nexmind
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexmind"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexmind-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nexmind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - nexmind-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nexmind-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - nexmind
    networks:
      - nexmind-network

  # Prometheus Monitoring (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: nexmind-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - nexmind-network
    profiles:
      - monitoring

  # Grafana Dashboard (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: nexmind-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - nexmind-network
    profiles:
      - monitoring

networks:
  nexmind-network:
    driver: bridge

volumes:
  nexmind-data:
    driver: local
  nexmind-logs:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  nginx-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
